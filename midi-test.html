<!--
  PopuPiano 29 硬件链路测试页
  目的：验证「安卓平板 ↔ 29 键钢琴」能连上、能控灯、能读按键
  用法：传到平板，用 Chrome 打开，点「连接钢琴」即可
  协议：PartyKeys / PopuPiano 29  (protocol.partykeys.org)
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>29键 连接测试</title>

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 16px;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #14161c; color: #f2f4f8;
    user-select: none; -webkit-user-select: none;
  }
  h1 { font-size: 20px; margin: 0 0 12px; }
  #status {
    padding: 10px 14px; border-radius: 10px; margin-bottom: 14px;
    font-size: 15px; line-height: 1.4; background: #2a2d36;
  }
  #status.ok  { background: #14532d; }
  #status.err { background: #5c1a1a; }
  .btnrow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  button {
    font-size: 16px; font-weight: 600; padding: 14px 18px;
    border: none; border-radius: 12px; color: #fff;
    background: #3b82f6; flex: 1 1 auto; min-width: 120px;
  }
  button:active { transform: scale(0.97); }
  button.connect { background: #16a34a; font-size: 18px; padding: 18px; flex-basis: 100%; }
  button.off { background: #475569; }
  /* 29 个琴键格子 */
  #keys {
    display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px;
  }
  .key {
    aspect-ratio: 1 / 1.3; border-radius: 10px;
    background: #2a2d36; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 13px; color: #9aa3b2; transition: background .08s, color .08s;
  }
  .key.on { color: #14161c; font-weight: 700; }
  .key .idx { font-size: 18px; font-weight: 700; }
  .hint { font-size: 13px; color: #8b93a3; margin-top: 16px; line-height: 1.5; }
</style>

<h1>🎹 29 键 连接测试</h1>
<div id="status">未连接。点下面绿色按钮开始。</div>

<button class="connect" onclick="connect()">连接钢琴</button>

<div class="btnrow">
  <button onclick="rainbowAll()">🌈 全部点亮</button>
  <button onclick="chase()">✨ 跑马灯</button>
  <button class="off" onclick="allOff()">熄灭</button>
</div>

<div id="keys"></div>

<div class="hint">
  ✅ 测试目标：① 上面三个按钮能控制琴键灯 → 说明「电脑→琴」通了；
  ② 你手按琴键，屏幕对应格子会亮 → 说明「琴→电脑」通了。<br>
  ⚠️ 灯亮起约有 200ms 延迟，属于硬件正常现象。
</div>

<script>
//=================== 协议常量 ===================//
const MFR = 0x03;            // PopuPiano 厂商头
const NOTE_BASE = 48;        // MIDI 48 = 最左 C3 = 键号 0
const KEY_COUNT = 29;

// 8 种 7-bit 颜色（0-127），上传到调色板槽位 1..8
const PALETTE = [
  [127,   0,   0],  // 1 红
  [127,  40,   0],  // 2 橙
  [127, 127,   0],  // 3 黄
  [  0, 127,   0],  // 4 绿
  [  0, 127, 127],  // 5 青
  [  0,   0, 127],  // 6 蓝
  [ 80,   0, 127],  // 7 紫
  [127, 127, 127],  // 8 白
];

let midi = null, out = null, input = null;

//=================== 界面：画 29 个格子 ===================//
const keysEl = document.getElementById('keys');
const keyEls = [];
for (let i = 0; i < KEY_COUNT; i++) {
  const d = document.createElement('div');
  d.className = 'key';
  d.innerHTML = `<span class="idx">${i}</span><span>${NOTE_BASE + i}</span>`;
  keysEl.appendChild(d);
  keyEls.push(d);
}
function setStatus(msg, cls = '') {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = cls;
}

//=================== 连接 ===================//
async function connect() {
  if (!navigator.requestMIDIAccess) {
    setStatus('这个浏览器不支持 Web MIDI。请用 Chrome 打开。', 'err');
    return;
  }
  try {
    setStatus('正在请求 MIDI 权限…（请在弹窗里点“允许”）');
    midi = await navigator.requestMIDIAccess({ sysex: true });
    pickPorts();
    midi.onstatechange = pickPorts;
  } catch (e) {
    setStatus('连接失败：' + e + '\n（多半是没授予 MIDI/SysEx 权限）', 'err');
  }
}

function pickPorts() {
  // 优先找名字含 popupiano 的口，找不到就用第一个
  out = null; input = null;
  for (const p of midi.outputs.values()) {
    if (/popupiano/i.test(p.name)) { out = p; break; }
    if (!out) out = p;
  }
  for (const p of midi.inputs.values()) {
    if (/popupiano/i.test(p.name)) { input = p; break; }
    if (!input) input = p;
  }
  if (!out && !input) {
    setStatus('没找到 MIDI 设备。\n蓝牙：先在系统设置里配对钢琴；USB：插好 OTG 线后重试。', 'err');
    return;
  }
  if (input) input.onmidimessage = onMidi;
  uploadPalette();   // 一次性把 8 种颜色传进琴里
  setStatus(`已连接 ✓  输出口: ${out ? out.name : '无'} | 输入口: ${input ? input.name : '无'}`, 'ok');
}

//=================== 发送 SysEx ===================//
function sendSysex(bytes) {
  if (out) out.send(bytes);
}

// CMD 0x1E：上传调色板（颜色填进槽位 1..N）
function uploadPalette() {
  const msg = [0xF0, MFR, 0x1E, PALETTE.length, 0x01];
  for (const [r, g, b] of PALETTE) msg.push(r, g, b);
  msg.push(0xF7);
  sendSysex(msg);
}

// CMD 0x20：把若干个键分配到调色板槽位。pairs = [[键号, 槽位], ...]，槽位 0 = 熄灭
function assign(pairs) {
  const msg = [0xF0, MFR, 0x20, pairs.length];
  for (const [id, slot] of pairs) msg.push(id, slot);
  msg.push(0xF7);
  sendSysex(msg);
}

//=================== 测试动作 ===================//
function rainbowAll() {
  const pairs = [];
  for (let i = 0; i < KEY_COUNT; i++) pairs.push([i, (i % PALETTE.length) + 1]);
  assign(pairs);
}
function allOff() {
  const pairs = [];
  for (let i = 0; i < KEY_COUNT; i++) pairs.push([i, 0]);
  assign(pairs);
}
let chaseTimer = null;
function chase() {
  if (chaseTimer) { clearInterval(chaseTimer); chaseTimer = null; allOff(); return; }
  let pos = 0;
  chaseTimer = setInterval(() => {
    const pairs = [];
    for (let i = 0; i < KEY_COUNT; i++) pairs.push([i, i === pos ? 8 : 0]); // 白色滑过
    assign(pairs);
    pos = (pos + 1) % KEY_COUNT;
  }, 120);
}

//=================== 读按键 ===================//
function onMidi(e) {
  const [st, note, vel] = e.data;
  if ((st & 0xF0) !== 0x90) return;          // 只看 note-on
  const id = note - NOTE_BASE;
  if (id < 0 || id >= KEY_COUNT) return;
  const pressed = vel > 0;                    // 力度 0 视为松开
  const slot = (id % PALETTE.length) + 1;
  // 屏幕反馈
  const el = keyEls[id];
  if (pressed) {
    const [r, g, b] = PALETTE[slot - 1];
    el.classList.add('on');
    el.style.background = `rgb(${r*2}, ${g*2}, ${b*2})`;
  } else {
    el.classList.remove('on');
    el.style.background = '';
  }
  // 同时点亮/熄灭真实琴键
  assign([[id, pressed ? slot : 0]]);
}
</script>
