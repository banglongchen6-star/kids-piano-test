<!--
  PartyKeys 36 调试台
  目的：验证 36 键键盘的输入与控灯（厂商头 05 30 7F7F 2000、进LED 0x0F、逐键RGB 0x15、清灯 0x71）
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PartyKeys 36 调试台</title>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; padding:14px; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:#14161c; color:#f2f4f8; font-size:15px; }
  h1{ font-size:19px; margin:0 0 10px; }
  #status{ padding:9px 12px; border-radius:9px; margin-bottom:12px; background:#2a2d36; line-height:1.4; font-size:14px; }
  #status.ok{ background:#14532d; } #status.err{ background:#5c1a1a; }
  button{ font-size:14px; font-weight:600; padding:10px 12px; margin:3px; border:none; border-radius:9px; color:#fff; background:#3b82f6; }
  button:active{ transform:scale(.96); } button.connect{ background:#16a34a; font-size:17px; padding:14px 22px; } button.off{ background:#475569; } button.warn{ background:#b45309; }
  .topbar{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-bottom:12px; }
  .panel{ background:#1c1f27; border:1px solid #2c2f3a; border-radius:12px; padding:12px; margin-bottom:12px; }
  .row{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:6px; }
  label{ font-size:13px; color:#b8c0cf; }
  input[type=number]{ width:60px; font-size:14px; padding:7px; border-radius:7px; border:1px solid #3a3f4b; background:#11131a; color:#fff; }
  #keys{ display:grid; grid-template-columns:repeat(12,1fr); gap:6px; }
  .key{ aspect-ratio:1/1.25; border-radius:8px; background:#2a2d36; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:#9aa3b2; transition:background .08s,color .08s; }
  .key.on{ color:#14161c; font-weight:700; }
  .logbar{ display:flex; align-items:center; gap:10px; margin:14px 0 6px; }
  #log{ height:260px; overflow-y:auto; background:#0d0f14; border:1px solid #2c2f3a; border-radius:10px; padding:8px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; line-height:1.5; }
  .le{ padding:2px 4px; border-radius:4px; white-space:pre-wrap; word-break:break-all; } .le .hex{ color:#5b6472; }
  .le.note{ color:#60a5fa; } .le.sx{ color:#34d399; } .le.tx{ color:#6b7280; } .le.sys{ color:#fbbf24; } .le.info{ color:#94a3b8; }
  .hint{ font-size:13px; color:#8b93a3; margin-top:10px; line-height:1.5; }
</style>

<h1>🎛 PartyKeys 36 调试台</h1>
<div id="status">未连接。点「连接」开始（蓝牙先在系统设置配对，USB 直接插）。</div>

<div class="topbar">
  <button class="connect" onclick="connect()">连接</button>
  <label><input type="checkbox" id="sound" checked> 🔊 按键发声</label>
</div>

<div class="panel">
  <div class="row">
    <button onclick="rainbow()">🌈 全亮彩虹</button>
    <button class="off" onclick="allOff()">熄灭</button>
    <button onclick="chase()">✨ 跑马灯</button>
    <button onclick="scan()">🔢 逐键扫描</button>
  </div>
  <div class="row">
    <label>灯号(0-35)</label><input type="number" id="mid" value="0">
    <label>颜色</label>
    <select id="mcol" style="padding:7px;border-radius:7px;background:#11131a;color:#fff;border:1px solid #3a3f4b">
      <option value="255,0,0">红</option><option value="255,160,0">橙</option><option value="255,255,0">黄</option>
      <option value="0,255,0">绿</option><option value="0,255,255">青</option><option value="0,0,255">蓝</option>
      <option value="160,0,255">紫</option><option value="255,255,255">白</option>
    </select>
    <button onclick="manual()">点亮</button>
  </div>
</div>

<div id="keys"></div>

<div class="logbar"><h2 style="margin:0;font-size:15px">📜 实时日志</h2>
  <label><input type="checkbox" id="onlyIn"> 只看输入</label>
  <button class="off" onclick="document.getElementById('log').innerHTML=''">清空</button>
</div>
<div id="log"></div>

<div class="hint">✅ 目标：① 上面按钮能控琴键灯 → 「电脑→琴」通；② 手按琴键 → 屏幕格子亮 + 日志解码 → 「琴→电脑」通。<br>36 键 MIDI 48–83，灯号 = 音符 − 48。</div>

<script>
const HEADER=[0xF0,0x05,0x30,0x7F,0x7F,0x20,0x00], BASE=48, N=36;
let midi=null, out=null;
const hx=b=>b.toString(16).toUpperCase().padStart(2,'0'); const hxs=a=>a.map(hx).join(' ');

// 屏幕 36 键
const keysEl=document.getElementById('keys'), keyEls=[];
for(let i=0;i<N;i++){ const d=document.createElement('div'); d.className='key'; d.innerHTML=`<span style="font-size:13px;font-weight:700">${i}</span><span>${BASE+i}</span>`; keysEl.appendChild(d); keyEls.push(d); }
function setStatus(m,c=''){ const s=document.getElementById('status'); s.textContent=m; s.className=c; }
function log(cls,text,raw){ if(document.getElementById('onlyIn').checked&&(cls==='tx'||cls==='info'))return;
  const el=document.getElementById('log'),d=document.createElement('div'); d.className='le '+cls;
  d.innerHTML=`[${new Date().toLocaleTimeString('zh',{hour12:false})}] ${text}`+(raw?`  <span class="hex">${hxs(raw)}</span>`:'');
  el.appendChild(d); while(el.children.length>600)el.removeChild(el.firstChild); el.scrollTop=el.scrollHeight; }

// 音频
let actx=null; function initAudio(){ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); }
function playNote(n,v){ if(!actx||!document.getElementById('sound').checked)return; const f=440*2**((n-69)/12),t=actx.currentTime,g=actx.createGain();
  const vol=Math.min(.5,(v/127)*.5+.12); g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+.008); g.gain.exponentialRampToValueAtTime(.0001,t+1.1); g.connect(actx.destination);
  [[f,'triangle',1],[f*2,'sine',.4]].forEach(([fr,ty,a])=>{const o=actx.createOscillator();o.type=ty;o.frequency.value=fr;const og=actx.createGain();og.gain.value=a;o.connect(og);og.connect(g);o.start(t);o.stop(t+1.2);}); }

// 连接
async function connect(){ if(!navigator.requestMIDIAccess){ setStatus('此浏览器不支持 Web MIDI，请用 Chrome。','err'); return; }
  try{ initAudio(); setStatus('正在请求 MIDI 权限…（弹窗点允许）'); midi=await navigator.requestMIDIAccess({sysex:true}); midi.onstatechange=pick; pick(); }
  catch(e){ setStatus('连接失败：'+e+'（多半没授予 SysEx 权限）','err'); } }
function pick(){ out=null; for(const p of midi.outputs.values()){ if(/partykey|popupiano/i.test(p.name)){out=p;break;} if(!out)out=p; }
  for(const p of midi.inputs.values()) p.onmidimessage=onMidi;
  const ins=[...midi.inputs.values()].map(p=>p.name).join(', ')||'无';
  if(!out&&ins==='无'){ setStatus('没找到 MIDI 设备。蓝牙先配对 / USB 插好后重连。','err'); return; }
  pkInit(); setStatus(`已连接 ✓  输出: ${out?out.name:'无'} | 输入: ${ins}`,'ok'); }

// PartyKeys 36 协议
function tx(msg){ if(out)out.send(msg); log('tx','TX →',msg); }
function pkInit(){ tx([...HEADER,0x0F,0x01,0xF7]); log('info','已发送进入 LED 模式 (0x0F)'); }
const enc=v=>[Math.floor(v/128),v%128];
function clearHW(){ tx([...HEADER,0x71,0x00,0xF7]); }
function lightGroups(groups){ if(!groups.length)return; const m=[...HEADER,0x15,groups.length]; groups.forEach(g=>{ m.push(...enc(g.rgb[0]),...enc(g.rgb[1]),...enc(g.rgb[2]),g.keys.length,...g.keys); }); m.push(0xF7); tx(m); }
const RAINBOW=[[255,0,0],[255,160,0],[255,255,0],[0,255,0],[0,255,255],[0,0,255],[160,0,255]];

function rainbow(){ const gr={}; for(let i=0;i<N;i++){ const c=RAINBOW[i%RAINBOW.length]; (gr[c.join()]=gr[c.join()]||{rgb:c,keys:[]}).keys.push(i); } clearHW(); lightGroups(Object.values(gr)); }
function allOff(){ clearHW(); }
let chaseT=null; function chase(){ if(chaseT){ clearInterval(chaseT); chaseT=null; allOff(); return; } let p=0; chaseT=setInterval(()=>{ clearHW(); lightGroups([{rgb:[255,255,255],keys:[p]}]); p=(p+1)%N; },130); }
function scan(){ let i=0; log('info','逐键扫描 0→'+(N-1)); const t=setInterval(()=>{ if(i>=N){clearInterval(t);allOff();log('info','扫描结束');return;} clearHW(); lightGroups([{rgb:RAINBOW[i%RAINBOW.length],keys:[i]}]); log('info','点亮灯号 '+i); i++; },380); }
function manual(){ const id=parseInt(document.getElementById('mid').value)||0; const rgb=document.getElementById('mcol').value.split(',').map(Number); clearHW(); lightGroups([{rgb,keys:[id]}]); }

// 接收
function onMidi(e){ const d=[...e.data];
  if(d[0]===0xF0){ log('sys',`SysEx (${d.length}字节)`,d); return; }
  const st=d[0]&0xF0, ch=d[0]&0x0F;
  if(st===0x90&&d[2]>0){ const idx=d[1]-BASE; playNote(d[1],d[2]); if(idx>=0&&idx<N){ keyEls[idx].classList.add('on'); const c=RAINBOW[idx%RAINBOW.length]; keyEls[idx].style.background=`rgb(${c[0]},${c[1]},${c[2]})`; clearHW(); lightGroups([{rgb:c,keys:[idx]}]); } log('note',`钢琴键按下 音符=${d[1]} 键号=${idx} 力度=${d[2]} ch=${ch}`,d); }
  else if(st===0x80||(st===0x90&&d[2]===0)){ const idx=d[1]-BASE; if(idx>=0&&idx<N){ keyEls[idx].classList.remove('on'); keyEls[idx].style.background=''; } log('note',`钢琴键松开 音符=${d[1]} ch=${ch}`,d); }
  else if(st===0xB0){ log('sys',`控制器 CC#${d[1]}=${d[2]}`,d); }
  else log('sys',`MIDI 0x${hx(d[0])}`,d); }

// 开发期自动刷新
(function(){ let last=null; setInterval(async()=>{ try{ const r=await fetch(location.href,{method:'HEAD',cache:'no-store'}); const tag=r.headers.get('etag')||r.headers.get('last-modified'); if(last&&tag&&tag!==last) location.reload(); last=tag; }catch(e){} },10000); })();
</script>
