<!--
  霓虹跳跳 (Neon Hop) — 合成波 3D 跳格节奏游戏
  小球沿蜿蜒的立体方块路径前进，穿过霓虹六边形门；音符对应 36 键亮灯，踩拍按键 → PERFECT 连击 + 跳跃 + 碎块迸发
  主题随段落切换：绿 / 橙 / 蓝（对应参考画面）；控灯走 ../pp29.js?v=36
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>霓虹跳跳</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%; overflow:hidden; background:#04060f; font-family:-apple-system,"PingFang SC",sans-serif;}
  #c{display:block; width:100vw; height:100vh; touch-action:none;}
  .overlay{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; color:#fff; text-align:center; background:rgba(4,6,15,.72); z-index:10;}
  .overlay.hidden{display:none;}
  .title{font-size:clamp(34px,8vw,68px); font-weight:900; letter-spacing:3px; text-shadow:0 0 18px #34e0ff,0 0 36px #b15bff;}
  .big{font-size:clamp(40px,9vw,80px); font-weight:900; color:#ff7ce0; text-shadow:0 0 22px #ff7ce0;}
  .sub{font-size:clamp(14px,2.4vw,20px); opacity:.85;}
  button{font-size:clamp(18px,3vw,26px); font-weight:800; color:#04060f; border:none; border-radius:999px;
    padding:.6em 1.6em; background:#5fe0a0; box-shadow:0 0 24px #5fe0a0aa; cursor:pointer;}
  button:active{transform:scale(.96);} button.alt{background:#7cc6ff; box-shadow:0 0 24px #7cc6ffaa;}
  .status{font-size:13px; opacity:.7; min-height:1em;}
</style>

<canvas id="c"></canvas>

<div class="overlay" id="startScreen">
  <div class="title">霓虹跳跳</div>
  <div class="sub">音符飞来 · 琴键亮灯 · 踩着节拍按下去 🎵</div>
  <button id="btnConnect">连接钢琴并开始</button>
  <button class="alt" id="btnSolo">无设备试玩（按空格）</button>
  <div class="status" id="status"></div>
</div>
<div class="overlay hidden" id="endScreen">
  <div class="big" id="endScore">0</div>
  <div class="sub">最高连击 <span id="endCombo">0</span> · 评级 <span id="endRank">A</span></div>
  <button id="btnAgain">再来一次</button>
</div>

<script src="../pp29.js?v=36"></script>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth; H=cv.clientHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

// ===== 主题（绿/橙/蓝）=====
const THEMES=[
  { sky:['#0c3326','#04130d'], sun:'#7CF06A', top:'#46e08e', side:'#1f8f57', edge:'#9dffc4', grid:'rgba(110,240,160,.34)', gate:'#7CF06A' },
  { sky:['#3a1606','#160604'], sun:'#FFB23E', top:'#ff9a44', side:'#b85e16', edge:'#ffd49a', grid:'rgba(255,160,80,.34)',  gate:'#FFB23E' },
  { sky:['#0b1f44','#05101f'], sun:'#5BB8FF', top:'#49a8ff', side:'#1f64b8', edge:'#bfe0ff', grid:'rgba(90,170,255,.34)',  gate:'#5BB8FF' },
];
let section=0; const theme=()=>THEMES[Math.floor(section)%3];

// ===== 谱面 =====
const BASE=48;
const MELODY=[60,64,67,72,71,67,64,67,62,65,69,74,72,69,65,62];
const BPM=100, BEAT=60000/BPM, LEAD_IN=2400, LIGHT_LEAD=760, TOTAL=64;
let chart=[];
const laneOf=i=>0.30*Math.sin(i*0.6);   // 轻微蜿蜒、整体居中（贴近参考）
function buildChart(){ chart=[]; for(let i=0;i<TOTAL;i++) chart.push({note:MELODY[i%MELODY.length], lane:laneOf(i), hit:LEAD_IN+i*BEAT, judged:false, lit:false, spiral:i%4===0}); }

// ===== 状态 =====
let running=false, startT=0, now=0, raf=0;
let score=0, combo=0, maxCombo=0, judged=0;
let debris=[], hopT=-1e9, flash={txt:'',mult:'',t:-1e9,color:'#fff'}, midiAccess=null;

// ===== 原创音频引擎（合成波/EDM：鼓 + 贝斯 + 琶音）=====
let actx=null, master=null, noiseBuf=null;
function initAudio(){ if(!actx){ actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=.8; master.connect(actx.destination);
    noiseBuf=actx.createBuffer(1,actx.sampleRate*0.3,actx.sampleRate); const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
  if(actx.state==='suspended') actx.resume(); }
// 玩家命中的明亮音
function tone(m,dur=.5,type='triangle',vol=.2){ if(!actx)return; const f=440*2**((m-69)/12),t=actx.currentTime,g=actx.createGain();
  g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+.01); g.gain.exponentialRampToValueAtTime(.0001,t+dur); g.connect(master);
  [[f,type,1],[f*2,'sine',.35]].forEach(([fr,ty,a])=>{const o=actx.createOscillator();o.type=ty;o.frequency.value=fr;const og=actx.createGain();og.gain.value=a;o.connect(og);og.connect(g);o.start(t);o.stop(t+dur+.05);}); }
function kick(t){ const o=actx.createOscillator(),g=actx.createGain(); o.frequency.setValueAtTime(135,t); o.frequency.exponentialRampToValueAtTime(45,t+.12);
  g.gain.setValueAtTime(.6,t); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.connect(g); g.connect(master); o.start(t); o.stop(t+.22); }
function hat(t,open){ const s=actx.createBufferSource(); s.buffer=noiseBuf; const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7500; const g=actx.createGain(); const dur=open?.12:.04;
  g.gain.setValueAtTime(open?.1:.16,t); g.gain.exponentialRampToValueAtTime(.001,t+dur); s.connect(hp); hp.connect(g); g.connect(master); s.start(t); s.stop(t+dur+.03); }
function snare(t){ const s=actx.createBufferSource(); s.buffer=noiseBuf; const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1900; const g=actx.createGain();
  g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.001,t+.16); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+.18); }
function synth(m,t,dur,vol,type){ const f=440*2**((m-69)/12),o=actx.createOscillator(),g=actx.createGain(); o.type=type||'sawtooth'; o.frequency.value=f;
  g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+.012); g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.03); }
// 步进音序器（8 分音符）：贝斯走 Am-F-C-G
const PROG=[57,53,48,55];
let musicOn=false, stepIdx=0, nextStepT=0, schedTimer=null;
function startMusic(){ if(!actx)return; musicOn=true; stepIdx=0; nextStepT=actx.currentTime+0.06; clearInterval(schedTimer);
  schedTimer=setInterval(()=>{ if(!musicOn)return; const sd=(BEAT/1000)/2; while(nextStepT<actx.currentTime+0.12){ playStep(stepIdx,nextStepT); stepIdx++; nextStepT+=sd; } },25); }
function stopMusic(){ musicOn=false; clearInterval(schedTimer); }
function playStep(i,t){ const inBar=i%8, bar=Math.floor(i/8)%4, root=PROG[bar];
  if(inBar%2===0) kick(t);
  hat(t, inBar%2===1);
  if(inBar===2||inBar===6) snare(t);
  if(inBar===0||inBar===3||inBar===4||inBar===6) synth(root-12,t,.2,.1,'sine');     // 贝斯
  if(inBar%2===0){ const beat=Math.floor(i/2); synth(MELODY[beat%MELODY.length],t,.26,.07,'sawtooth'); } // 主旋律琶音
}

// ===== MIDI =====
async function connectMidi(){ const st=document.getElementById('status');
  if(!navigator.requestMIDIAccess){ st.textContent='此浏览器不支持 Web MIDI，改用空格试玩。'; return; }
  try{ midiAccess=await navigator.requestMIDIAccess({sysex:true});
    const bind=()=>{ [...midiAccess.inputs.values()].forEach(i=>i.onmidimessage=onMidi); PP29.attach(midiAccess); };
    midiAccess.onstatechange=bind; bind();
  }catch(e){ st.textContent='未获得 MIDI 权限，可用空格试玩。'; } }
function onMidi(e){ const [s,n,v]=e.data; if((s&0xf0)===0x90&&v>0) hit(n); }

// ===== 判定 =====
const mult=()=>Math.min(4,1+Math.floor(combo/8));
function hit(note){ if(!running)return; let best=null,bd=9999;
  for(const t of chart){ if(t.judged)continue; const d=Math.abs(t.hit-now); if(d>360)continue; if(note!=null&&t.note!==note)continue; if(d<bd){bd=d;best=t;} }
  if(!best)return; best.judged=true; judged++; if(best.lit){PP29.clear(best.note-BASE);best.lit=false;}
  tone(best.note,.5); hopT=now;
  if(bd<130){ score+=Math.round(60*mult()); combo++; flashTxt('PERFECT',theme().edge); spawnDebris(16); }
  else { score+=Math.round(25*mult()); combo++; flashTxt('GOOD','#fff7a0'); spawnDebris(9); }
  maxCombo=Math.max(maxCombo,combo); section=Math.floor(judged/16); }
function flashTxt(txt,color){ flash={txt,mult:'x'+mult(),t:now,color}; }
function missTile(t){ t.judged=true; judged++; combo=0; if(t.lit){PP29.clear(t.note-BASE);t.lit=false;} flashTxt('MISS','#ff6b8a'); section=Math.floor(judged/16); }

// ===== 伪 3D 投影 =====
const FOCAL=0.92, SPACING=0.52;
const horizonY=()=>H*0.44, groundY=()=>H*0.84;
function project(worldX,z){ const s=FOCAL/(z+FOCAL); return { x:W/2+worldX*s*(W*0.52), y:horizonY()+(groundY()-horizonY())*s, s }; }
const ease=t=>t*t*(3-2*t);

// ===== 碎块 =====
function spawnDebris(n){ const fi=Math.floor(pos()), f=pos()-fi; const lx=lerp(laneOf(fi),laneOf(fi+1),ease(f)); const p=project(lx,0);
  for(let i=0;i<n;i++){ const a=Math.random()*6.28,sp=3+Math.random()*6; debris.push({x:p.x,y:p.y-10,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-7,rot:Math.random()*6,vr:(Math.random()-.5)*.4,sz:6+Math.random()*8,life:1,c:Math.random()<.5?theme().edge:'#fff'}); } }
const lerp=(a,b,t)=>a+(b-a)*t;
const pos=()=>(now-LEAD_IN)/BEAT;

// ===== 主循环 =====
function start(){ buildChart(); running=true; startT=performance.now(); score=combo=maxCombo=judged=0; section=0; debris=[]; startMusic();
  document.getElementById('startScreen').classList.add('hidden'); document.getElementById('endScreen').classList.add('hidden'); cancelAnimationFrame(raf); loop(); }
function loop(){ now=performance.now()-startT;
  for(const t of chart){ if(t.judged)continue; if(!t.lit&&t.hit-now<LIGHT_LEAD&&t.hit-now>-200){ PP29.set(t.note-BASE,1+(t.note%6)); t.lit=true; } if(now-t.hit>360) missTile(t); }
  if(judged>=TOTAL){ running=false; return end(); }
  debris.forEach(d=>{ d.x+=d.vx; d.y+=d.vy; d.vy+=.5; d.rot+=d.vr; d.life-=.022; }); debris=debris.filter(d=>d.life>0);
  render(); raf=requestAnimationFrame(loop); }

// ===== 渲染 =====
function render(){ const th=theme(); drawSky(th); drawSun(th); drawPalms(th); drawGrid(th); drawGate(th); drawPath(th); drawHero(th); drawDebris(); drawHud(th); }
function drawSky(th){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,th.sky[0]); g.addColorStop(.45,th.sky[1]); g.addColorStop(1,'#04060f'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function drawSun(th){ const r=Math.min(W,H)*0.14,sx=W/2,sy=horizonY()-r*0.5; ctx.save();
  const g=ctx.createRadialGradient(sx,sy,r*0.2,sx,sy,r); g.addColorStop(0,'#fff'); g.addColorStop(.4,th.sun); g.addColorStop(1,th.sun+'00');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,r,0,6.29); ctx.fill();
  drawSunFigure(sx,sy,r);                                  // 太阳里的剪影舞者（原创抽象）
  ctx.fillStyle=th.sky[1]; for(let i=0;i<5;i++){ const y=sy-r*0.1+i*r*0.3; ctx.fillRect(sx-r,y,r*2,r*0.11); } ctx.restore(); }
function drawSunFigure(sx,sy,r){ ctx.save(); ctx.translate(sx,sy+r*0.12); const u=r*0.46;
  ctx.fillStyle='rgba(55,12,52,.40)'; ctx.strokeStyle='rgba(55,12,52,.40)'; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,-u*0.95,u*0.22,0,6.29); ctx.fill();                              // 头
  ctx.lineWidth=u*0.28; ctx.beginPath(); ctx.moveTo(0,-u*0.7); ctx.lineTo(0,u*0.12); ctx.stroke(); // 躯干
  ctx.lineWidth=u*0.15; ctx.beginPath();                                                       // 双臂上举
  ctx.moveTo(0,-u*0.5); ctx.quadraticCurveTo(-u*0.55,-u*0.78,-u*0.34,-u*1.2);
  ctx.moveTo(0,-u*0.5); ctx.quadraticCurveTo(u*0.55,-u*0.78,u*0.34,-u*1.2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,u*0.06); ctx.lineTo(-u*0.42,u*0.72); ctx.lineTo(u*0.42,u*0.72); ctx.closePath(); ctx.fill(); // 裙摆
  ctx.lineWidth=u*0.13; ctx.beginPath(); ctx.moveTo(-u*0.12,u*0.62); ctx.lineTo(-u*0.2,u*1.08); ctx.moveTo(u*0.12,u*0.62); ctx.lineTo(u*0.2,u*1.08); ctx.stroke(); // 腿
  ctx.restore(); }
function drawPalms(th){ ctx.save(); ctx.strokeStyle='rgba(0,0,0,.6)'; const hY=horizonY();
  [[W*0.13,1],[W*0.87,-1],[W*0.03,1],[W*0.97,-1]].forEach(([x,d],i)=>{ const h=H*0.15*(i<2?1:.7); ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(x,hY); ctx.lineTo(x+d*7,hY-h); ctx.stroke();
    for(let k=-2;k<=2;k++){ ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+d*7,hY-h); ctx.quadraticCurveTo(x+d*7+k*16,hY-h-20,x+d*7+k*30,hY-h+8); ctx.stroke(); } }); ctx.restore(); }
function drawGrid(th){ ctx.save(); ctx.strokeStyle=th.grid; ctx.lineWidth=1.4; const hY=horizonY();
  for(let i=-12;i<=12;i++){ const sx=W/2+i*W*0.018, ex=W/2+i*W*0.13; ctx.beginPath(); ctx.moveTo(sx,hY); ctx.lineTo(ex,H); ctx.stroke(); }
  const sc=(now*0.04)%48; for(let j=0;j<16;j++){ const t=(j*48+sc)/(16*48); const y=hY+(H-hY)*t*t; ctx.globalAlpha=.45*(1-t)+.1; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); } ctx.restore(); }
function drawGate(th){ const cx=W/2, cy=H*0.17, r=Math.min(W,H)*0.082; ctx.save(); ctx.translate(cx,cy);
  ctx.strokeStyle='#ff5bd0'; ctx.lineWidth=r*0.2; ctx.shadowColor='#ff5bd0'; ctx.shadowBlur=24; ctx.globalAlpha=.95;
  ctx.beginPath(); for(let i=0;i<6;i++){ const a=-Math.PI/2+i*Math.PI/3; const x=Math.cos(a)*r,y=Math.sin(a)*r; i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.closePath(); ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.fillStyle='#ff5bd0'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='900 '+r*0.66+'px sans-serif'; ctx.fillText('x'+mult(),0,r*0.05); ctx.restore(); }
function drawPath(th){ const P=pos(), fi=Math.floor(P);
  for(let k=9;k>=0;k--){ const idx=fi+k; if(idx<0||idx>=TOTAL) continue; const t=chart[idx]; const z=(idx-P)*SPACING; if(z<-SPACING) continue; drawTile(th,t,z, idx===Math.ceil(P)&&!t.judged); } }
function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawTile(th,t,z,nextTarget){ const p=project(t.lane,Math.max(0,z)); const w=Math.min(W,H)*0.30*p.s, hw=w/2, hh=w*0.31, thick=w*0.13, rad=w*0.14;
  ctx.save(); ctx.translate(p.x,p.y);
  // 厚度（底暗面）
  ctx.fillStyle=th.side; rrect(-hw,-hh+thick,w,hh*2,rad); ctx.fill();
  // 顶面（扁平圆角方块）
  if(nextTarget){ ctx.shadowColor=th.edge; ctx.shadowBlur=28*p.s; }
  const g=ctx.createLinearGradient(0,-hh,0,hh); g.addColorStop(0,th.edge); g.addColorStop(.4,th.top); g.addColorStop(1,th.side);
  ctx.fillStyle=g; rrect(-hw,-hh,w,hh*2,rad); ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle=th.edge; ctx.lineWidth=2*p.s; ctx.stroke();
  // 图标（白色菱形/螺旋）
  if(t.spiral){ ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.lineWidth=2.4*p.s; ctx.beginPath(); for(let a=0;a<7.5;a+=0.3){ const q=a*1.9*p.s; const x=Math.cos(a)*q, y=Math.sin(a)*q*0.6; a?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke(); }
  else { ctx.fillStyle='rgba(255,255,255,.95)'; const d=w*0.17; ctx.beginPath(); ctx.moveTo(0,-d*0.7); ctx.lineTo(d,0); ctx.lineTo(0,d*0.7); ctx.lineTo(-d,0); ctx.closePath(); ctx.fill(); }
  ctx.restore(); }
function drawHero(th){ const P=pos(), fi=Math.floor(P), f=P-fi; const lx=lerp(laneOf(fi),laneOf(Math.min(TOTAL-1,fi+1)),ease(f)); const p=project(lx,0);
  const recent=Math.max(0,1-(now-hopT)/200); const hop=Math.sin(f*Math.PI)*46 + recent*6; const x=p.x, y=p.y-hop;
  ctx.save();
  // 落点大光圈（参考画面的着陆爆光）
  const lp=1-Math.min(1,f*1.6); const rg=ctx.createRadialGradient(p.x,p.y,2,p.x,p.y,Math.min(W,H)*0.27); rg.addColorStop(0,'#ffffff'); rg.addColorStop(.35,th.edge); rg.addColorStop(.7,th.top+'88'); rg.addColorStop(1,th.top+'00');
  ctx.globalAlpha=.5+.5*lp; ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(p.x,p.y,Math.min(W,H)*0.27,Math.min(W,H)*0.11,0,0,6.29); ctx.fill(); ctx.globalAlpha=1;
  ctx.translate(x,y); const r=Math.min(W,H)*0.052;
  // 耳朵
  [[-r*0.62,-r*0.72],[r*0.62,-r*0.72]].forEach(([ex,ey])=>{ ctx.fillStyle='#9ad8ff'; ctx.beginPath(); ctx.moveTo(ex-r*0.3,ey+r*0.34); ctx.lineTo(ex,ey-r*0.4); ctx.lineTo(ex+r*0.3,ey+r*0.34); ctx.closePath(); ctx.fill(); });
  // 身体
  ctx.shadowColor=th.edge; ctx.shadowBlur=22; const bg=ctx.createLinearGradient(0,-r,0,r); bg.addColorStop(0,'#e6f7ff'); bg.addColorStop(1,'#a9e2ff');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,r,0,6.29); ctx.fill(); ctx.shadowBlur=0;
  // 头带
  ctx.fillStyle='#ff8ad0'; ctx.fillRect(-r,-r*0.28,r*2,r*0.3);
  // 爱心肚
  ctx.fillStyle='#ffd24a'; ctx.beginPath(); ctx.arc(0,r*0.28,r*0.3,0,6.29); ctx.fill();
  ctx.fillStyle='#ff5b9e'; const hs=r*0.12; ctx.beginPath(); ctx.arc(-hs,r*0.24,hs,0,6.29); ctx.arc(hs,r*0.24,hs,0,6.29); ctx.moveTo(-hs*2,r*0.27); ctx.lineTo(0,r*0.45); ctx.lineTo(hs*2,r*0.27); ctx.fill();
  // 麦克风
  ctx.strokeStyle='#ff8ad0'; ctx.lineWidth=r*0.12; ctx.beginPath(); ctx.moveTo(r*0.7,r*0.1); ctx.lineTo(r*1.15,-r*0.35); ctx.stroke();
  ctx.fillStyle='#ffd24a'; ctx.beginPath(); ctx.arc(r*1.2,-r*0.42,r*0.2,0,6.29); ctx.fill();
  ctx.restore(); }
function drawDebris(){ debris.forEach(d=>{ ctx.save(); ctx.globalAlpha=Math.max(0,d.life); ctx.translate(d.x,d.y); ctx.rotate(d.rot); ctx.fillStyle=d.c; ctx.fillRect(-d.sz/2,-d.sz/2,d.sz,d.sz); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fillRect(-d.sz/2,-d.sz/2,d.sz,d.sz*0.35); ctx.restore(); }); ctx.globalAlpha=1; }
function drawHud(th){ ctx.save(); ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='900 '+Math.min(W,H)*0.065+'px sans-serif'; ctx.shadowColor=th.edge; ctx.shadowBlur=12; ctx.fillText(score,W/2,H*0.30); ctx.shadowBlur=0;
  const ft=now-flash.t; if(ft<560){ const a=1-ft/560; ctx.globalAlpha=a; const pop=1+0.12*(1-a);
    ctx.fillStyle=flash.color; ctx.font='900 '+Math.min(W,H)*0.072*pop+'px sans-serif'; ctx.shadowColor=flash.color; ctx.shadowBlur=18; ctx.fillText(flash.txt,W/2,H*0.40);
    ctx.fillStyle='#ff5bd0'; ctx.font='900 '+Math.min(W,H)*0.044*pop+'px sans-serif'; ctx.shadowColor='#ff5bd0'; ctx.fillText(flash.mult,W/2,H*0.46); ctx.globalAlpha=1; ctx.shadowBlur=0; } ctx.restore(); }

// ===== 结束 / 输入 =====
function end(){ stopMusic(); PP29.allOff(); document.getElementById('endScore').textContent=score; document.getElementById('endCombo').textContent=maxCombo;
  const rate=score/(TOTAL*60*2); document.getElementById('endRank').textContent=rate>.7?'S':rate>.5?'A':rate>.3?'B':'C'; document.getElementById('endScreen').classList.remove('hidden'); }
addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); hit(null);} });
cv.addEventListener('pointerdown',()=>hit(null));
document.getElementById('btnConnect').addEventListener('click',async()=>{ initAudio(); await connectMidi(); start(); });
document.getElementById('btnSolo').addEventListener('click',()=>{ initAudio(); start(); });
document.getElementById('btnAgain').addEventListener('click',()=>{ initAudio(); start(); });
(function idle(){ if(!running){ now=performance.now()%100000; render(); requestAnimationFrame(idle); } })();
