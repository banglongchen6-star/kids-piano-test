<!--
  跟灯弹琴 · 儿童 app 框架（版式骨架，横屏）
  目的：先把界面版式 / 导航流程立起来；玩法逻辑后续接入。
  界面：开始页 → 选歌页 → 弹奏页(核心) → 完成页 + 设置面板
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>跟灯弹琴</title>

<style>
  :root{
    --pink:#ff7eb3; --blue:#56c2ff; --yellow:#ffce4a; --green:#7be08f; --purple:#a98bff;
    --ink:#3a3550; --card:#ffffff; --soft:#fff5fb;
    --shadow:0 8px 22px rgba(120,80,160,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; margin:0;}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#bdeaff 0%,#e7d4ff 50%,#ffd9ec 100%);
    overflow:hidden;
  }
  .app{position:fixed; inset:0;}
  .screen{position:absolute; inset:0; display:none; flex-direction:column; padding:18px;}
  .screen.active{display:flex;}
  button{font-family:inherit; cursor:pointer; border:none;}
  .btn{
    font-size:clamp(18px,2.6vw,26px); font-weight:800; color:#fff; padding:.7em 1.4em;
    border-radius:999px; box-shadow:var(--shadow); background:var(--pink);
  }
  .btn:active{transform:scale(.95);}
  .btn.blue{background:var(--blue);} .btn.green{background:var(--green);}
  .btn.yellow{background:var(--yellow); color:var(--ink);} .btn.ghost{background:#fff; color:var(--ink);}
  .round{width:clamp(46px,6vw,60px); height:clamp(46px,6vw,60px); border-radius:999px; background:#fff;
    box-shadow:var(--shadow); font-size:clamp(20px,2.6vw,26px); display:grid; place-items:center; color:var(--ink);}

  /* ---------- 顶栏 ---------- */
  .topbar{display:flex; align-items:center; gap:12px;}
  .topbar .title{font-size:clamp(18px,2.4vw,24px); font-weight:800;}
  .spacer{flex:1;}
  .chip{display:flex; align-items:center; gap:7px; background:#fff; border-radius:999px; padding:8px 14px;
    box-shadow:var(--shadow); font-weight:700; font-size:clamp(13px,1.7vw,16px);}
  .dot{width:11px; height:11px; border-radius:999px; background:#ff6b6b;}
  .dot.on{background:var(--green);}

  /* ---------- 开始页 ---------- */
  #home{align-items:center; justify-content:center; text-align:center;}
  #home .logo{font-size:clamp(40px,8vw,80px); font-weight:900;
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
    -webkit-background-clip:text; background-clip:text; color:transparent; margin:6px 0;}
  #home .sub{font-size:clamp(15px,2vw,20px); color:#6a6385; margin-bottom:18px;}
  .home-tools{position:absolute; top:18px; right:18px; display:flex; gap:10px;}
  .home-status{position:absolute; top:18px; left:18px;}

  /* ---------- 选歌页 ---------- */
  .songs{flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:16px; overflow-y:auto; padding:14px 4px; align-content:start;}
  .song{background:var(--card); border-radius:22px; box-shadow:var(--shadow); padding:16px;
    display:flex; flex-direction:column; gap:8px; transition:transform .1s;}
  .song:active{transform:scale(.97);}
  .song .cover{height:90px; border-radius:16px; display:grid; place-items:center; font-size:46px;}
  .song .name{font-weight:800; font-size:clamp(15px,1.9vw,19px);}
  .song .stars{color:var(--yellow); font-size:18px;}
  .song.locked{opacity:.55;}

  /* ---------- 弹奏页 ---------- */
  #play{padding:14px;}
  .stage{flex:1; display:flex; gap:14px; min-height:0;}
  .lefthand{width:24%; min-width:150px; background:rgba(255,255,255,.55); border-radius:22px;
    box-shadow:var(--shadow); padding:12px; display:flex; flex-direction:column;}
  .lefthand h3{margin:0 0 8px; font-size:14px; color:#6a6385; text-align:center;}
  .pad-grid{flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .pad-grid .pad{border-radius:14px; background:#fff; box-shadow:0 3px 8px rgba(0,0,0,.08);
    display:grid; place-items:center; font-weight:700; color:#9a93b5; font-size:13px;}
  .guide{flex:1; background:rgba(255,255,255,.55); border-radius:22px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; position:relative;}
  .guide .now{font-size:clamp(22px,4vw,40px); font-weight:900; color:var(--purple);}
  .guide .hint{color:#6a6385; font-size:clamp(13px,1.7vw,16px);}
  .mascot{width:clamp(80px,12vw,130px); height:auto;}

  /* 屏幕钢琴 */
  .piano-wrap{margin-top:14px;}
  .piano{position:relative; height:clamp(110px,20vh,180px); display:flex;
    border-radius:0 0 16px 16px; overflow:hidden; box-shadow:var(--shadow);}
  .wkey{flex:1; background:linear-gradient(#fff,#f3f3f7); border-right:1px solid #e3e3ee;
    border-radius:0 0 9px 9px; position:relative;}
  .wkey:last-child{border-right:none;}
  .wkey.lit{background:linear-gradient(#bdf5c9,var(--green));}
  .wkey .lbl{position:absolute; bottom:6px; left:0; right:0; text-align:center; font-size:11px; color:#b9b6c8;}
  .bkey{position:absolute; top:0; width:5%; height:62%; background:linear-gradient(#4a4560,#2a2540);
    border-radius:0 0 6px 6px; z-index:2; transform:translateX(-50%);}
  .bkey.lit{background:linear-gradient(#5fd0ff,#1f9fe0);}

  /* ---------- 完成页 ---------- */
  #result{align-items:center; justify-content:center; text-align:center; gap:16px;}
  #result .big{font-size:clamp(34px,6vw,60px); font-weight:900; color:var(--pink);}
  #result .bigstars{font-size:clamp(40px,8vw,76px);}

  /* ---------- 设置面板 ---------- */
  .overlay{position:absolute; inset:0; background:rgba(40,30,60,.45); display:none; place-items:center; z-index:50;}
  .overlay.active{display:grid;}
  .panel{background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:24px; width:min(520px,86vw); max-height:86vh; overflow:auto;}
  .panel h2{margin:0 0 14px;}
  .set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid #f0ecf6;}
  .seg{display:flex; gap:6px;}
  .seg button{padding:8px 14px; border-radius:999px; background:#f1ecfa; font-weight:700; color:#7a7398;}
  .seg button.sel{background:var(--purple); color:#fff;}
  .switch{width:54px; height:30px; border-radius:999px; background:#ddd; position:relative;}
  .switch.on{background:var(--green);}
  .switch::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:999px; background:#fff; transition:.15s;}
  .switch.on::after{left:27px;}

  /* ---------- 竖屏提示 ---------- */
  #rotate{position:fixed; inset:0; background:#2a2540; color:#fff; display:none; place-items:center; text-align:center; z-index:99; font-size:22px;}
  @media (orientation:portrait){ #rotate{display:grid;} .app{display:none;} }
</style>

<div id="rotate"><div>🔄<br>请把平板横过来<br><span style="font-size:15px;opacity:.7">本应用为横屏设计</span></div></div>

<div class="app">

  <!-- ============ 开始页 ============ -->
  <section class="screen active" id="home">
    <div class="home-status"><div class="chip"><span class="dot" id="connDot"></span><span id="connText">未连接</span></div></div>
    <div class="home-tools">
      <button class="round" onclick="openSettings()">⚙️</button>
    </div>
    <div style="font-size:clamp(56px,11vw,120px)">🎹</div>
    <div class="logo">跟灯弹琴</div>
    <div class="sub">看灯按键 · 轻松学琴</div>
    <button class="btn" style="font-size:clamp(22px,3.4vw,34px)" onclick="go('songs')">▶ 开始弹奏</button>
  </section>

  <!-- ============ 选歌页 ============ -->
  <section class="screen" id="songs">
    <div class="topbar">
      <button class="round" onclick="go('home')">⬅</button>
      <div class="title">选一首歌</div>
      <div class="spacer"></div>
      <div class="chip"><span class="dot" id="connDot2"></span><span id="connText2">未连接</span></div>
    </div>
    <div class="songs" id="songList"></div>
  </section>

  <!-- ============ 弹奏页（核心） ============ -->
  <section class="screen" id="play">
    <div class="topbar">
      <button class="round" onclick="go('songs')">⬅</button>
      <div class="title" id="playTitle">小星星</div>
      <div class="spacer"></div>
      <div class="chip">⭐ <span id="progress">0 / 14</span></div>
      <button class="round" onclick="go('result')">⏸</button>
    </div>

    <div class="stage">
      <!-- 左手区：根据模式显示 胶囊 或 24键 -->
      <div class="lefthand">
        <h3 id="leftTitle">左手 · 胶囊和弦</h3>
        <div class="pad-grid" id="padGrid"></div>
      </div>
      <!-- 中间引导区 -->
      <div class="guide">
        <svg class="mascot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="#ffce4a"/><circle cx="38" cy="44" r="6" fill="#3a3550"/><circle cx="62" cy="44" r="6" fill="#3a3550"/><path d="M36 62 Q50 76 64 62" stroke="#3a3550" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="28" cy="58" r="6" fill="#ff9ec4"/><circle cx="72" cy="58" r="6" fill="#ff9ec4"/></svg>
        <div class="now" id="nowNote">准备好了吗？</div>
        <div class="hint">跟着亮起来的琴键按下去吧 🌟</div>
      </div>
    </div>

    <!-- 屏幕钢琴（镜像硬件，让孩子看屏也知道按哪个键） -->
    <div class="piano-wrap"><div class="piano" id="piano"></div></div>
  </section>

  <!-- ============ 完成页 ============ -->
  <section class="screen" id="result">
    <div class="bigstars">⭐⭐⭐</div>
    <div class="big">太棒啦！</div>
    <div class="sub" style="color:#6a6385">你弹完了《<span id="resultSong">小星星</span>》</div>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button class="btn green" onclick="go('play')">🔁 再来一次</button>
      <button class="btn blue" onclick="go('songs')">🎵 选别的歌</button>
      <button class="btn ghost" onclick="go('home')">🏠 回主页</button>
    </div>
  </section>

  <!-- ============ 设置面板 ============ -->
  <div class="overlay" id="settings">
    <div class="panel">
      <h2>⚙️ 设置</h2>
      <div class="set-row">
        <span>设备连接</span>
        <button class="btn blue" style="font-size:16px; padding:.5em 1.1em" onclick="fakeConnect()">连接钢琴</button>
      </div>
      <div class="set-row">
        <span>左手模式</span>
        <div class="seg" id="modeSeg">
          <button class="sel" onclick="setMode('capsule',this)">胶囊和弦</button>
          <button onclick="setMode('keys24',this)">24键</button>
        </div>
      </div>
      <div class="set-row">
        <span>🔊 按键发声</span>
        <div class="switch on" id="swSound" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="set-row" style="border:none">
        <span>🎵 背景音乐</span>
        <div class="switch" id="swBgm" onclick="toggleSwitch(this)"></div>
      </div>
      <div style="text-align:right; margin-top:16px">
        <button class="btn" onclick="closeSettings()">完成</button>
      </div>
    </div>
  </div>

</div>

<script>
//================= 导航 =================//
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='play') buildPiano();
}
function openSettings(){ document.getElementById('settings').classList.add('active'); }
function closeSettings(){ document.getElementById('settings').classList.remove('active'); }
function toggleSwitch(el){ el.classList.toggle('on'); }

//================= 连接状态（占位，后续接入真 MIDI）=================//
let connected=false;
function setConn(on){
  connected=on;
  document.querySelectorAll('#connDot,#connDot2').forEach(d=>d.classList.toggle('on',on));
  document.querySelectorAll('#connText,#connText2').forEach(t=>t.textContent=on?'已连接':'未连接');
}
function fakeConnect(){ setConn(!connected); }  // 占位：以后换成真正的 Web MIDI 连接

//================= 左手模式 =================//
let mode='capsule';
function setMode(m,btn){
  mode=m;
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  buildLeftHand();
}
function buildLeftHand(){
  const grid=document.getElementById('padGrid');
  const title=document.getElementById('leftTitle');
  grid.innerHTML='';
  if(mode==='capsule'){
    title.textContent='左手 · 胶囊和弦';
    const chords=['C','Dm','Em','F','G','Am','G7','Bdim','—'];
    grid.style.gridTemplateColumns='repeat(3,1fr)';
    chords.forEach(c=>{ const d=document.createElement('div'); d.className='pad'; d.textContent=c; grid.appendChild(d); });
  }else{
    title.textContent='左手 · 24 键';
    grid.style.gridTemplateColumns='repeat(6,1fr)';
    for(let i=0;i<24;i++){ const d=document.createElement('div'); d.className='pad'; d.style.fontSize='11px'; d.textContent=i; grid.appendChild(d); }
  }
}

//================= 屏幕钢琴（29 键 C3–E5 / MIDI 48–76）=================//
function buildPiano(){
  const piano=document.getElementById('piano');
  if(piano.dataset.built) return;
  piano.dataset.built='1';
  const WHITE=[0,2,4,5,7,9,11];          // 白键音级
  const SHARP_AFTER=[0,2,5,7,9];         // 这些音级后面有黑键
  // 先放白键
  let whites=[];
  for(let n=48;n<=76;n++){ if(WHITE.includes(n%12)) whites.push(n); }
  whites.forEach(n=>{
    const k=document.createElement('div'); k.className='wkey'; k.dataset.note=n;
    if(n%12===0){ const l=document.createElement('div'); l.className='lbl'; l.textContent='C'+(Math.floor(n/12)-1); k.appendChild(l); }
    piano.appendChild(k);
  });
  // 再叠黑键
  const wW=100/whites.length;
  whites.forEach((n,i)=>{
    if(SHARP_AFTER.includes(n%12) && n+1<=76){
      const b=document.createElement('div'); b.className='bkey'; b.dataset.note=n+1;
      b.style.left=((i+1)*wW)+'%'; b.style.width=(wW*0.62)+'%';
      piano.appendChild(b);
    }
  });
}
// 供以后玩法调用：点亮 / 熄灭某个屏幕琴键
function litKey(note,on){ const el=document.querySelector(`.piano [data-note="${note}"]`); if(el) el.classList.toggle('lit',on); }

//================= 选歌页占位数据 =================//
const SONGS=[
  {name:'小星星', icon:'⭐', color:'#fff3c4', stars:1},
  {name:'两只老虎', icon:'🐯', color:'#ffd9c4', stars:1},
  {name:'生日快乐', icon:'🎂', color:'#ffd6ec', stars:2},
  {name:'划船歌', icon:'⛵', color:'#cfeaff', stars:2},
  {name:'欢乐颂', icon:'🎶', color:'#e0d4ff', stars:3, locked:true},
  {name:'更多…', icon:'➕', color:'#e8e8f0', stars:0, locked:true},
];
function buildSongs(){
  const list=document.getElementById('songList');
  SONGS.forEach(s=>{
    const d=document.createElement('div'); d.className='song'+(s.locked?' locked':'');
    d.innerHTML=`<div class="cover" style="background:${s.color}">${s.icon}</div>
      <div class="name">${s.name}</div>
      <div class="stars">${'★'.repeat(s.stars)}${'☆'.repeat(3-s.stars)}</div>`;
    if(!s.locked) d.onclick=()=>{ document.getElementById('playTitle').textContent=s.name; document.getElementById('resultSong').textContent=s.name; go('play'); };
    list.appendChild(d);
  });
}

//================= 初始化 =================//
buildSongs(); buildLeftHand();
</script>
