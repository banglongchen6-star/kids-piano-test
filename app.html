<!--
  跟灯弹琴 · 儿童 app 框架 v2（横屏，三区域大字版式）
  主页：曲库瀑布流 / 创作区 / 趣味音乐小游戏
  曲库→选歌瀑布流→跟灯弹奏页；创作区、小游戏为占位页。玩法与真实硬件后续接入。
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>跟灯弹琴</title>

<style>
  :root{
    --pink:#ff7eb3; --blue:#56c2ff; --yellow:#ffce4a; --green:#7be08f; --purple:#a98bff;
    --ink:#3a3550; --card:#fff; --shadow:0 8px 22px rgba(120,80,160,.18);
    --z1:#ECE0FF; --z1t:#5B4BB0; --z2:#CFEFE4; --z2t:#0F6E56; --z3:#FFD7E6; --z3t:#B23B66;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; margin:0;}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#bdeaff,#e7d4ff 50%,#ffd9ec); overflow:hidden;}
  .app{position:fixed; inset:0;}
  .screen{position:absolute; inset:0; display:none; flex-direction:column; padding:16px;}
  .screen.active{display:flex;}
  button{font-family:inherit; cursor:pointer; border:none;}
  .round{width:clamp(44px,6vw,58px); height:clamp(44px,6vw,58px); border-radius:999px; background:#fff;
    box-shadow:var(--shadow); font-size:clamp(20px,2.6vw,26px); display:grid; place-items:center; color:var(--ink);}
  .btn{font-size:clamp(17px,2.4vw,24px); font-weight:800; color:#fff; padding:.7em 1.4em; border-radius:999px;
    box-shadow:var(--shadow); background:var(--pink);}
  .btn:active{transform:scale(.95);} .btn.blue{background:var(--blue);} .btn.green{background:var(--green);}
  .btn.ghost{background:#fff; color:var(--ink);}
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .topbar .title{font-size:clamp(18px,2.4vw,24px); font-weight:800;} .spacer{flex:1;}
  .chip{display:flex; align-items:center; gap:7px; background:#fff; border-radius:999px; padding:8px 14px;
    box-shadow:var(--shadow); font-weight:700; font-size:clamp(12px,1.6vw,15px);}
  .dot{width:11px; height:11px; border-radius:999px; background:#ff6b6b;} .dot.on{background:var(--green);}

  /* ---------- 主页：三区域 ---------- */
  .hub-grid{flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1.12fr 0.88fr; gap:16px; min-height:0;}
  .zone{border-radius:28px; box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:12px; transition:transform .1s;}
  .zone:active{transform:scale(.98);}
  .zone .emoji{font-size:clamp(46px,8vw,92px); line-height:1;}
  .zone .zt{font-size:clamp(28px,4.6vw,50px); font-weight:900; letter-spacing:2px;}
  .z1{grid-column:1; grid-row:1; background:var(--z1); color:var(--z1t);}
  .z2{grid-column:1; grid-row:2; background:var(--z2); color:var(--z2t);}
  .z3{grid-column:2; grid-row:1/span 2; background:var(--z3); color:var(--z3t);}
  .z3 .emoji{font-size:clamp(72px,13vw,150px);} .z3 .zt{font-size:clamp(34px,5.6vw,64px);}

  /* ---------- 曲库瀑布流 ---------- */
  .waterfall{flex:1; overflow-y:auto; columns:4 180px; column-gap:16px; padding:4px;}
  .song{break-inside:avoid; margin-bottom:16px; background:var(--card); border-radius:22px; box-shadow:var(--shadow);
    padding:14px; display:flex; flex-direction:column; gap:8px; transition:transform .1s;}
  .song:active{transform:scale(.97);}
  .song .cover{border-radius:16px; display:grid; place-items:center; font-size:46px;}
  .song .name{font-weight:800; font-size:clamp(15px,1.9vw,19px);}
  .song .stars{color:var(--yellow); font-size:17px;} .song.locked{opacity:.55;}

  /* ---------- 小游戏合集 ---------- */
  .games{flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:16px; overflow-y:auto; align-content:start; padding:4px;}
  .game{background:var(--card); border-radius:22px; box-shadow:var(--shadow); padding:18px; text-align:center;
    display:flex; flex-direction:column; gap:10px; transition:transform .1s;}
  .game:active{transform:scale(.97);} .game .gi{font-size:52px;} .game .gn{font-weight:800; font-size:17px;}
  .game.soon{opacity:.6;}

  /* ---------- 创作区占位 ---------- */
  .placeholder{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#6a6385;}
  .placeholder .pe{font-size:clamp(70px,12vw,120px);} .placeholder .pt{font-size:clamp(22px,3vw,32px); font-weight:800; color:var(--ink);}

  /* ---------- 弹奏页 ---------- */
  .stage{flex:1; display:flex; gap:14px; min-height:0;}
  .lefthand{width:24%; min-width:150px; background:rgba(255,255,255,.55); border-radius:22px; box-shadow:var(--shadow);
    padding:12px; display:flex; flex-direction:column;}
  .lefthand h3{margin:0 0 8px; font-size:14px; color:#6a6385; text-align:center;}
  .pad-grid{flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .pad-grid .pad{border-radius:14px; background:#fff; box-shadow:0 3px 8px rgba(0,0,0,.08); display:grid; place-items:center;
    font-weight:700; color:#9a93b5; font-size:13px;}
  .guide{flex:1; background:rgba(255,255,255,.55); border-radius:22px; box-shadow:var(--shadow); display:flex;
    flex-direction:column; align-items:center; justify-content:center; gap:14px;}
  .guide .now{font-size:clamp(22px,4vw,40px); font-weight:900; color:var(--purple);}
  .guide .hint{color:#6a6385; font-size:clamp(13px,1.7vw,16px);}
  .mascot{width:clamp(80px,12vw,130px); height:auto;}
  .piano-wrap{margin-top:14px;}
  .piano{position:relative; height:clamp(110px,20vh,180px); display:flex; border-radius:0 0 16px 16px; overflow:hidden; box-shadow:var(--shadow);}
  .wkey{flex:1; background:linear-gradient(#fff,#f3f3f7); border-right:1px solid #e3e3ee; border-radius:0 0 9px 9px; position:relative;}
  .wkey:last-child{border-right:none;} .wkey.lit{background:linear-gradient(#bdf5c9,var(--green));}
  .wkey .lbl{position:absolute; bottom:6px; left:0; right:0; text-align:center; font-size:11px; color:#b9b6c8;}
  .bkey{position:absolute; top:0; height:62%; background:linear-gradient(#4a4560,#2a2540); border-radius:0 0 6px 6px; z-index:2; transform:translateX(-50%);}
  .bkey.lit{background:linear-gradient(#5fd0ff,#1f9fe0);}

  /* ---------- 完成页 ---------- */
  #result{align-items:center; justify-content:center; text-align:center; gap:16px;}
  #result .big{font-size:clamp(34px,6vw,60px); font-weight:900; color:var(--pink);}
  #result .bigstars{font-size:clamp(40px,8vw,76px);}
  .sub{font-size:clamp(15px,2vw,20px); color:#6a6385;}

  /* ---------- 设置 / 竖屏提示 ---------- */
  .overlay{position:absolute; inset:0; background:rgba(40,30,60,.45); display:none; place-items:center; z-index:50;}
  .overlay.active{display:grid;}
  .panel{background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:24px; width:min(520px,86vw); max-height:86vh; overflow:auto;}
  .panel h2{margin:0 0 14px;}
  .set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid #f0ecf6;}
  .seg{display:flex; gap:6px;} .seg button{padding:8px 14px; border-radius:999px; background:#f1ecfa; font-weight:700; color:#7a7398;}
  .seg button.sel{background:var(--purple); color:#fff;}
  .switch{width:54px; height:30px; border-radius:999px; background:#ddd; position:relative;}
  .switch.on{background:var(--green);} .switch::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:999px; background:#fff; transition:.15s;}
  .switch.on::after{left:27px;}
  #rotate{position:fixed; inset:0; background:#2a2540; color:#fff; display:none; place-items:center; text-align:center; z-index:99; font-size:22px;}
  @media (orientation:portrait){ #rotate{display:grid;} .app{display:none;} }
</style>

<div id="rotate"><div>🔄<br>请把平板横过来<br><span style="font-size:15px;opacity:.7">本应用为横屏设计</span></div></div>

<div class="app">

  <!-- ============ 主页：三区域 ============ -->
  <section class="screen active" id="hub">
    <div class="topbar">
      <div class="chip"><span class="dot" id="d0"></span><span id="c0">未连接</span></div>
      <div class="spacer"></div>
      <button class="round" onclick="openSettings()">⚙️</button>
    </div>
    <div class="hub-grid">
      <div class="zone z1" onclick="go('library')"><div class="emoji">🎵</div><div class="zt">曲库瀑布流</div></div>
      <div class="zone z2" onclick="go('create')"><div class="emoji">🪄</div><div class="zt">创作区</div></div>
      <div class="zone z3" onclick="go('games')"><div class="emoji">🎮</div><div class="zt">趣味音乐小游戏</div></div>
    </div>
  </section>

  <!-- ============ 曲库瀑布流 ============ -->
  <section class="screen" id="library">
    <div class="topbar">
      <button class="round" onclick="go('hub')">⬅</button>
      <div class="title">🎵 曲库瀑布流</div><div class="spacer"></div>
      <div class="chip"><span class="dot" id="d1"></span><span id="c1">未连接</span></div>
    </div>
    <div class="waterfall" id="songList"></div>
  </section>

  <!-- ============ 创作区（占位） ============ -->
  <section class="screen" id="create">
    <div class="topbar">
      <button class="round" onclick="go('hub')">⬅</button>
      <div class="title">🪄 创作区</div><div class="spacer"></div>
    </div>
    <div class="placeholder">
      <div class="pe">🪄</div>
      <div class="pt">自由弹 · 录制 · 回放</div>
      <div class="sub">创作玩法开发中…</div>
    </div>
  </section>

  <!-- ============ 趣味音乐小游戏 ============ -->
  <section class="screen" id="games">
    <div class="topbar">
      <button class="round" onclick="go('hub')">⬅</button>
      <div class="title">🎮 趣味音乐小游戏</div><div class="spacer"></div>
    </div>
    <div class="games" id="gameList"></div>
  </section>

  <!-- ============ 弹奏页 ============ -->
  <section class="screen" id="play">
    <div class="topbar">
      <button class="round" onclick="go('library')">⬅</button>
      <div class="title" id="playTitle">小星星</div><div class="spacer"></div>
      <div class="chip">⭐ <span id="progress">0 / 14</span></div>
      <button class="round" onclick="go('result')">⏸</button>
    </div>
    <div class="stage">
      <div class="lefthand"><h3 id="leftTitle">左手 · 胶囊和弦</h3><div class="pad-grid" id="padGrid"></div></div>
      <div class="guide">
        <svg class="mascot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="#ffce4a"/><circle cx="38" cy="44" r="6" fill="#3a3550"/><circle cx="62" cy="44" r="6" fill="#3a3550"/><path d="M36 62 Q50 76 64 62" stroke="#3a3550" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="28" cy="58" r="6" fill="#ff9ec4"/><circle cx="72" cy="58" r="6" fill="#ff9ec4"/></svg>
        <div class="now" id="nowNote">准备好了吗？</div>
        <div class="hint">跟着亮起来的琴键按下去吧 🌟</div>
      </div>
    </div>
    <div class="piano-wrap"><div class="piano" id="piano"></div></div>
  </section>

  <!-- ============ 完成页 ============ -->
  <section class="screen" id="result">
    <div class="bigstars">⭐⭐⭐</div>
    <div class="big">太棒啦！</div>
    <div class="sub">你弹完了《<span id="resultSong">小星星</span>》</div>
    <div style="display:flex; gap:14px; flex-wrap:wrap; justify-content:center;">
      <button class="btn green" onclick="go('play')">🔁 再来一次</button>
      <button class="btn blue" onclick="go('library')">🎵 选别的歌</button>
      <button class="btn ghost" onclick="go('hub')">🏠 回主页</button>
    </div>
  </section>

  <!-- ============ 设置 ============ -->
  <div class="overlay" id="settings">
    <div class="panel">
      <h2>⚙️ 设置</h2>
      <div class="set-row"><span>设备连接</span><button class="btn blue" style="font-size:16px; padding:.5em 1.1em" onclick="connectPiano()">连接钢琴</button></div>
      <div class="set-row"><span>左手模式</span><div class="seg" id="modeSeg"><button class="sel" data-mode="capsule" onclick="setMode('capsule')">胶囊和弦</button><button data-mode="keys24" onclick="setMode('keys24')">24键</button></div></div>
      <div class="set-row"><span>🔊 按键发声</span><div class="switch on" onclick="this.classList.toggle('on'); soundOn=this.classList.contains('on')"></div></div>
      <div class="set-row" style="border:none"><span>🎵 背景音乐</span><div class="switch" onclick="this.classList.toggle('on')"></div></div>
      <div style="text-align:right; margin-top:16px"><button class="btn" onclick="closeSettings()">完成</button></div>
    </div>
  </div>

</div>

<script>
//============ 导航 ============//
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='play') buildPiano();
}
function openSettings(){ document.getElementById('settings').classList.add('active'); }
function closeSettings(){ document.getElementById('settings').classList.remove('active'); }

//============ 连接状态 ============//
let connected=false;
function setConn(on,name){ connected=on;
  document.querySelectorAll('#d0,#d1').forEach(d=>d.classList.toggle('on',on));
  document.querySelectorAll('#c0,#c1').forEach(t=>t.textContent=on?(name?'已连接·'+name:'已连接'):'未连接'); }

//============ 声音（Web Audio 离线合成）============//
let audioCtx=null, soundOn=true;
function initAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function playNote(note,vel){ if(!audioCtx||!soundOn) return;
  const f=440*Math.pow(2,(note-69)/12), t=audioCtx.currentTime, g=audioCtx.createGain();
  const vol=Math.min(0.5,(vel/127)*0.5+0.12);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+1.1); g.connect(audioCtx.destination);
  [[f,'triangle',1],[f*2,'sine',0.4]].forEach(([fr,ty,a])=>{const o=audioCtx.createOscillator();o.type=ty;o.frequency.value=fr;const og=audioCtx.createGain();og.gain.value=a;o.connect(og);og.connect(g);o.start(t);o.stop(t+1.2);});
}

//============ 真·连接钢琴（Web MIDI）============//
let midi=null, out=null;
async function connectPiano(){
  if(!navigator.requestMIDIAccess){ alert('此浏览器不支持 Web MIDI，请用 Chrome 打开'); return; }
  try{
    initAudio();
    midi=await navigator.requestMIDIAccess({sysex:true});
    midi.onstatechange=refreshPorts; refreshPorts();
    send(3,[0x0A,0,0]);   // 查询左手设备，自动切模式
    confirmFlash();        // 琴闪一下，确认双向连通
  }catch(e){ setConn(false); alert('连接失败：'+e+'\n（多半未授予 MIDI/SysEx 权限）'); }
}
function refreshPorts(){
  out=null; for(const p of midi.outputs.values()){ if(/popupiano/i.test(p.name)){out=p;break;} if(!out)out=p; }
  for(const p of midi.inputs.values()) p.onmidimessage=onMidi;
  const inName=[...midi.inputs.values()].map(p=>p.name)[0]||'';
  setConn(!!(out||inName), ((out&&out.name)||inName||'').replace(/popupiano/i,'PopuPiano').slice(0,12));
}
function send(comp,payload){ if(out) out.send([0xF0,comp,...payload,0xF7]); }
function uploadPalette(comp){ const P=[[127,0,0],[127,127,0],[0,127,0],[0,127,127],[0,0,127],[80,0,127],[127,127,127]]; const f=[]; P.forEach(c=>f.push(...c)); send(comp,[0x1E,P.length,1,...f]); }
function lightAll(comp,n){ const ps=[]; for(let i=0;i<n;i++)ps.push(i,(i%7)+1); send(comp,[0x20,n,...ps]); }
function allOff(comp,n){ const ps=[]; for(let i=0;i<n;i++)ps.push(i,0); send(comp,[0x20,n,...ps]); }
function confirmFlash(){ try{ uploadPalette(3); lightAll(3,29); setTimeout(()=>allOff(3,29),700); }catch(e){} }

//============ 接收：解码 + 发声 + 屏幕点灯 ============//
function onMidi(e){
  const d=[...e.data];
  if(d[0]===0xF0){
    const cmd=d[2], p=d.slice(3,d.length-1);
    if(cmd===0x0A){ const m=p[0]===2?'keys24':(p[0]===1?'capsule':null); if(m) setMode(m); }
    if(cmd===0x09){ const m=p[1]===2?'keys24':(p[1]===1?'capsule':null); if(m) setMode(m); }
  }else{
    const st=d[0]&0xF0;
    if(st===0x90&&d[2]>0){ playNote(d[1],d[2]); litKey(d[1],true); }
    else if(st===0x80||(st===0x90&&d[2]===0)){ litKey(d[1],false); }
  }
}

//============ 左手模式 ============//
let mode='capsule';
function setMode(m){ mode=m; document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('sel', b.dataset.mode===m)); buildLeftHand(); }
function buildLeftHand(){
  const grid=document.getElementById('padGrid'), title=document.getElementById('leftTitle'); grid.innerHTML='';
  if(mode==='capsule'){ title.textContent='左手 · 胶囊和弦'; grid.style.gridTemplateColumns='repeat(3,1fr)';
    ['C','Dm','Em','F','G','Am','G7','Bdim','—'].forEach(c=>{const d=document.createElement('div');d.className='pad';d.textContent=c;grid.appendChild(d);});
  }else{ title.textContent='左手 · 24 键'; grid.style.gridTemplateColumns='repeat(6,1fr)';
    for(let i=0;i<24;i++){const d=document.createElement('div');d.className='pad';d.style.fontSize='11px';d.textContent=i;grid.appendChild(d);} }
}

//============ 屏幕钢琴（29 键 C3–E5 / MIDI 48–76）============//
function buildPiano(){
  const piano=document.getElementById('piano'); if(piano.dataset.built) return; piano.dataset.built='1';
  const WHITE=[0,2,4,5,7,9,11], SHARP_AFTER=[0,2,5,7,9]; let whites=[];
  for(let n=48;n<=76;n++) if(WHITE.includes(n%12)) whites.push(n);
  whites.forEach(n=>{ const k=document.createElement('div'); k.className='wkey'; k.dataset.note=n;
    if(n%12===0){const l=document.createElement('div');l.className='lbl';l.textContent='C'+(Math.floor(n/12)-1);k.appendChild(l);} piano.appendChild(k); });
  const wW=100/whites.length;
  whites.forEach((n,i)=>{ if(SHARP_AFTER.includes(n%12)&&n+1<=76){ const b=document.createElement('div'); b.className='bkey'; b.dataset.note=n+1;
    b.style.left=((i+1)*wW)+'%'; b.style.width=(wW*0.62)+'%'; piano.appendChild(b); } });
}
function litKey(note,on){ const el=document.querySelector(`.piano [data-note="${note}"]`); if(el) el.classList.toggle('lit',on); }

//============ 曲库（占位数据，瀑布流）============//
const SONGS=[
  {name:'小星星',icon:'⭐',color:'#fff3c4',stars:1,h:100},
  {name:'两只老虎',icon:'🐯',color:'#ffd9c4',stars:1,h:130},
  {name:'生日快乐',icon:'🎂',color:'#ffd6ec',stars:2,h:90},
  {name:'划船歌',icon:'⛵',color:'#cfeaff',stars:2,h:120},
  {name:'小蜜蜂',icon:'🐝',color:'#fff0b3',stars:1,h:110},
  {name:'欢乐颂',icon:'🎶',color:'#e0d4ff',stars:3,h:140,locked:true},
  {name:'粉刷匠',icon:'🎨',color:'#d6f5e0',stars:2,h:95},
  {name:'更多…',icon:'➕',color:'#ececf2',stars:0,h:90,locked:true},
];
function buildSongs(){
  const list=document.getElementById('songList');
  SONGS.forEach(s=>{ const d=document.createElement('div'); d.className='song'+(s.locked?' locked':'');
    d.innerHTML=`<div class="cover" style="background:${s.color};height:${s.h}px">${s.icon}</div>
      <div class="name">${s.name}</div><div class="stars">${'★'.repeat(s.stars)}${'☆'.repeat(3-s.stars)}</div>`;
    if(!s.locked) d.onclick=()=>{ document.getElementById('playTitle').textContent=s.name; document.getElementById('resultSong').textContent=s.name; go('play'); };
    list.appendChild(d); });
}

//============ 小游戏合集（占位）============//
const GAMES=[
  {n:'节奏拍拍',i:'👏'},{n:'听音辨音',i:'👂'},{n:'找不同',i:'🔍'},
  {n:'音乐记忆',i:'🧠'},{n:'音阶接龙',i:'🎼'},{n:'涂色音乐',i:'🖍️'},
];
function buildGames(){
  const list=document.getElementById('gameList');
  GAMES.forEach(g=>{ const d=document.createElement('div'); d.className='game soon';
    d.innerHTML=`<div class="gi">${g.i}</div><div class="gn">${g.n}</div><div class="sub" style="font-size:13px">敬请期待</div>`;
    list.appendChild(d); });
}

buildSongs(); buildGames(); buildLeftHand();
